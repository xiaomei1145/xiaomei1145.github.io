<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线露骨视频</title>
  <style>
    /* Optional: CSS styles for video container */
    #video-container {
      width: 100%;
      text-align: center;
    }
    #video {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" controls autoplay loop>
  <source src="./dililili.mp4" type="video/mp4">
  Your browser does not support the video tag.
    </video>
    </video>
<audio id="audio" loop>
  <source src="./dililili.mp3" type="audio/mpeg">
  Your browser does not support the audio tag.
</audio>
  </div>

  <script>
    var video = document.getElementById('video');
    var audio = document.getElementById('audio');

    
    function playAudio() {
      audio.play();
    }

    video.addEventListener('canplaythrough', playAudio);
  </script>
</body>
</html>
